<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Quest Flow</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-page: #f0f2f5;
      --bg-card: #ffffff;
      --bg-sidebar: #fafbfc;
      --bg-hover: #f1f5f9;
      --text-primary: #1a1a2e;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --green-bg: #f0fdf4;
      --red: #ef4444;
      --red-bg: #fef2f2;
      --amber: #f59e0b;
      --amber-bg: #fffbeb;
      --purple: #8b5cf6;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --radius: 12px;
      --radius-sm: 8px;
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-r: env(safe-area-inset-right, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left, 0px);
    }

    [data-theme="dark"] {
      --bg-page: #000000;
      --bg-card: #111111;
      --bg-sidebar: #0a0a0a;
      --bg-hover: #1a1a1a;
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-muted: #555555;
      --border: #222222;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --green: #22c55e;
      --green-bg: #0a2a10;
      --red: #ef4444;
      --red-bg: #2a0a0a;
      --amber: #f59e0b;
      --amber-bg: #2a1a00;
      --purple: #8b5cf6;
      --shadow: 0 4px 24px rgba(0,0,0,0.6);
    }

    html {
      overflow-x: clip;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100dvh;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
      overflow-x: clip;
      width: 100%;
      position: relative;
    }

    /* ============= LAYOUT ============= */
    .app-container {
      display: flex;
      min-height: 100dvh;
      overflow-x: clip;
    }

    /* Left panel */
    .panel-left {
      width: 40%;
      max-width: 480px;
      min-width: 320px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      padding-top: calc(24px + var(--safe-t));
      padding-bottom: calc(24px + var(--safe-b));
      padding-left: calc(20px + var(--safe-l));
      padding-right: calc(20px + var(--safe-r));
      overflow: clip;
      transition: background 0.3s, border-color 0.3s;
    }

    /* Right panel */
    .panel-right {
      flex: 1;
      background: var(--bg-card);
      padding: 24px 28px;
      padding-top: calc(24px + var(--safe-t));
      padding-bottom: calc(24px + var(--safe-b));
      padding-left: calc(28px + var(--safe-l));
      padding-right: calc(28px + var(--safe-r));
      overflow-y: auto;
      transition: background 0.3s;
      min-width: 0;
    }

    /* ============= HEADER ============= */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .theme-btn {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
      min-height: 44px;
    }
    .theme-btn:hover { background: var(--border); }

    /* ============= ADD FORM ============= */
    .add-form { margin-bottom: 18px; flex-shrink: 0; }
    .add-form .row { display: flex; gap: 8px; margin-bottom: 8px; }
    .add-form input[type="text"] {
      flex: 1; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; outline: none;
      background: var(--bg-card); color: var(--text-primary);
      transition: border-color 0.2s; min-height: 44px;
    }
    .add-form input[type="text"]:focus { border-color: var(--accent); }
    .add-form .meta-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .add-form .meta-row label {
      display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary);
    }
    .add-form .meta-row input[type="date"],
    .add-form .meta-row input[type="time"] {
      padding: 6px 8px; border: 1.5px solid var(--border); border-radius: 5px;
      font-size: 12px; outline: none; background: var(--bg-card); color: var(--text-primary);
      min-height: 36px;
    }
    .add-form .meta-row input:focus { border-color: var(--accent); }

    /* ============= STATS ============= */
    .stats {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
      padding: 10px 14px; background: var(--bg-card);
      border-radius: var(--radius-sm); border: 1px solid var(--border);
      font-size: 12px; transition: background 0.3s, border-color 0.3s; flex-shrink: 0;
    }
    .stats span { color: var(--text-secondary); }
    .stats strong { color: var(--text-primary); }
    .stats .overdue-count strong { color: var(--red); }

    /* ============= SEARCH ============= */
    .search-wrap {
      display: flex; gap: 6px; margin-bottom: 12px; flex-shrink: 0;
    }
    .search-wrap input {
      flex: 1; padding: 9px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 13px; outline: none;
      background: var(--bg-card); color: var(--text-primary);
      transition: border-color 0.2s; min-height: 44px;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-btn {
      padding: 9px 14px; border: none; border-radius: var(--radius-sm);
      font-size: 16px; line-height: 1; cursor: pointer; background: var(--accent);
      color: #fff; transition: opacity 0.15s; flex-shrink: 0; min-height: 44px;
    }
    .search-btn:hover { opacity: 0.85; }

    /* ============= TABS ============= */
    .tabs {
      display: flex; gap: 3px; margin-bottom: 14px; background: var(--bg-card);
      border-radius: var(--radius-sm); padding: 3px; border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      flex: 1; padding: 7px 0; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--text-muted);
      transition: background 0.2s, color 0.2s; min-height: 36px;
    }
    .tab.active { background: var(--accent); color: #fff; }
    .tab:hover:not(.active) { color: var(--text-primary); }

    /* ============= TASK LIST ============= */
    .task-list-wrap {
      flex: 1; overflow-y: auto; overflow-x: clip; min-height: 0;
      touch-action: pan-y;
    }
    .task-list-wrap::-webkit-scrollbar { width: 5px; }
    .task-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .task-item {
      display: flex; align-items: center; gap: 8px; padding: 6px 10px;
      border-radius: var(--radius-sm); background: var(--bg-card);
      border: 1.5px solid var(--accent); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      animation: slideIn 0.2s ease; position: relative;
    }
    .task-item:hover { border-color: var(--accent); }
    .task-item.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }

    .task-item.status-pending { border-left: 4px solid var(--amber); }
    .task-item.status-completed { border-left: 4px solid var(--accent); }
    .task-item.status-in-progress { border-left: 4px solid var(--accent); }

    .task-item.overdue { border-left: 4px solid var(--red); background: var(--red-bg); }

    .task-item .t-check {
      width: 16px; height: 16px; accent-color: var(--green);
      cursor: pointer; flex-shrink: 0;
    }
    .task-item .t-body { flex: 1; min-width: 0; overflow: hidden; }
    .task-item .t-title {
      font-size: 13px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .task-item.status-completed .t-title { text-decoration: line-through; opacity: 0.55; }
    .task-item .t-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .task-item .t-meta .overdue-tag { color: var(--red); font-weight: 600; }

    .task-item .t-dots {
      width: 44px; height: 44px; border: none; border-radius: 4px;
      background: transparent; color: var(--text-muted); cursor: pointer;
      font-size: 18px; line-height: 1; transition: background 0.15s;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    }
    .task-item .t-dots:hover { background: var(--border); }

    .dropdown {
      position: absolute; right: 0; top: 100%; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 50;
      min-width: 170px; padding: 4px; animation: fadeIn 0.15s ease;
    }
    .dropdown button {
      display: block; width: 100%; text-align: left; padding: 10px 12px;
      border: none; background: transparent; color: var(--text-secondary);
      font-size: 13px; cursor: pointer; border-radius: 5px;
      transition: background 0.1s; min-height: 44px;
    }
    .dropdown button:hover { background: var(--border); color: var(--text-primary); }
    .dropdown button.danger { color: var(--red); }
    .dropdown button.danger:hover { background: var(--red-bg); }

    /* ============= RIGHT PANEL — DETAIL ============= */
    .detail-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; text-align: center;
      animation: fadeIn 0.3s ease; color: var(--text-muted);
    }
    .detail-placeholder .icon { font-size: 56px; margin-bottom: 16px; }
    .detail-placeholder h3 { font-size: 20px; color: var(--text-secondary); margin-bottom: 6px; }

    .detail-view { animation: fadeIn 0.25s ease; }

    .detail-view .detail-header {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 24px;
    }
    .detail-header-left { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
    .detail-view .detail-title {
      font-size: 22px; font-weight: 700; color: var(--text-primary);
      word-break: break-word; flex: 1;
    }

    .detail-section { margin-bottom: 22px; }
    .detail-section label {
      display: block; font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 6px;
    }

    .detail-section .status-toggle-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .detail-section .status-toggle-group button {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 12px; font-weight: 600; cursor: pointer; background: transparent;
      color: var(--text-secondary); transition: background 0.15s, color 0.15s;
      min-height: 44px;
    }

    .detail-section .date-inputs { display: flex; gap: 12px; flex-wrap: wrap; }
    .detail-section .date-inputs label {
      display: flex; align-items: center; gap: 6px; font-size: 13px;
      font-weight: 400; text-transform: none; letter-spacing: normal;
      color: var(--text-secondary);
    }
    .detail-section .date-inputs input[type="date"],
    .detail-section .date-inputs input[type="time"] {
      padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 5px;
      font-size: 13px; outline: none; background: var(--bg-card);
      color: var(--text-primary); min-height: 44px;
    }
    .detail-section .date-inputs input:focus { border-color: var(--accent); }

    .feedback-on-time {
      display: inline-block; margin-top: 6px; padding: 4px 12px; border-radius: 6px;
      font-size: 12px; font-weight: 600; background: var(--green-bg);
      color: var(--green); animation: popIn 0.3s ease;
    }

    .detail-section .btn-action {
      padding: 10px 18px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer; background: transparent;
      color: var(--text-secondary); transition: background 0.15s; min-height: 44px;
    }
    .detail-section .btn-action:hover { background: var(--border); }
    .detail-section .btn-action.primary { color: var(--purple); border-color: var(--purple); }
    .detail-section .btn-action.primary:hover { background: color-mix(in srgb, var(--purple) 10%, transparent); }
    .detail-section .btn-action.danger { color: var(--red); border-color: var(--red); }
    .detail-section .btn-action.danger:hover { background: var(--red-bg); }

    .reminder-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .reminder-list li {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: var(--bg-sidebar); border-radius: var(--radius-sm); font-size: 13px;
    }
    .reminder-list li .r-info { flex: 1; color: var(--text-primary); }
    .reminder-list li .r-actions { display: flex; gap: 4px; }

    .history-list { list-style: none; }
    .history-list li {
      display: flex; align-items: flex-start; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .history-list li:last-child { border-bottom: none; }
    .history-list .h-action { color: var(--text-primary); flex: 1; }
    .history-list .h-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }

    /* ============= EMPTY STATE ============= */
    .empty-state {
      text-align: center; padding: 40px 16px; color: var(--text-muted);
      font-size: 13px; animation: fadeIn 0.3s ease;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 8px; display: block; }

    /* ============= MODAL ============= */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; animation: fadeIn 0.2s ease;
      overflow-x: clip;
      padding: 16px;
      padding-top: calc(16px + var(--safe-t));
      padding-bottom: calc(16px + var(--safe-b));
    }
    .modal {
      background: var(--bg-card); border-radius: 14px; padding: 24px;
      width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15); animation: popIn 0.25s ease;
    }
    .modal h3 { font-size: 16px; margin-bottom: 16px; color: var(--text-primary); }
    .modal label {
      display: block; font-size: 13px; font-weight: 400; text-transform: none;
      letter-spacing: normal; color: var(--text-secondary); margin-bottom: 4px;
    }
    .modal input[type="date"], .modal input[type="time"] {
      width: 100%; padding: 10px; border: 1.5px solid var(--border);
      border-radius: 6px; font-size: 13px; outline: none; margin-bottom: 12px;
      background: var(--bg-card); color: var(--text-primary); min-height: 44px;
    }
    .modal input:focus { border-color: var(--purple); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    .modal-actions button {
      padding: 10px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer; min-height: 44px;
    }

    /* ============= MOBILE FULL-SCREEN MODAL ============= */
    .mobile-modal {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-page); overflow-y: auto; overflow-x: clip;
      animation: slideUp 0.3s ease;
      touch-action: pan-y;
      padding: 20px;
      padding-top: calc(20px + var(--safe-t));
      padding-bottom: calc(20px + var(--safe-b));
      padding-left: calc(20px + var(--safe-l));
      padding-right: calc(20px + var(--safe-r));
      width: 100%;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .mobile-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .mobile-modal-header h2 {
      font-size: 18px; font-weight: 700; color: var(--text-primary);
    }
    .mobile-modal-close {
      padding: 8px; border: none; background: none; cursor: pointer;
      font-size: 24px; color: var(--text-muted); min-height: 44px; min-width: 44px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ============= MOBILE LIST SELECT ============= */
    .list-select { display: flex; flex-direction: column; gap: 10px; padding-top: 20px; flex: 1; overflow-y: auto; min-height: 0; }
    .list-card {
      padding: 18px 20px; border-radius: var(--radius-sm);
      background: var(--bg-card); border: 1.5px solid var(--border);
      cursor: pointer; transition: border-color 0.15s;
      display: flex; align-items: center; justify-content: space-between;
      min-height: 60px;
    }
    .list-card:hover { border-color: var(--accent); }
    .list-card .lc-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .list-card .lc-count { font-size: 13px; color: var(--text-muted); }
    .list-card .lc-arrow { font-size: 18px; color: var(--text-muted); }

    /* ============= TOAST ============= */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; z-index: 2000;
      animation: popIn 0.3s ease; box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      max-width: calc(100vw - 32px); white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.success { background: var(--green); color: #fff; }
    .toast.info { background: var(--accent); color: #fff; }

    /* ============= ANIMATIONS ============= */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ============= RESPONSIVE ============= */
    .mobile-only { display: none; }
    .desktop-only { display: flex; }

    @media (max-width: 767px) {
      .desktop-only { display: none !important; }
      .mobile-only { display: flex; }

      .panel-left {
        width: 100% !important;
        max-width: none !important;
        min-width: 0 !important;
        border-right: none !important;
        min-height: 100dvh;
      }
      .panel-right { display: none !important; }

      body { overscroll-behavior: none; touch-action: pan-y; }

      .add-form .row { flex-wrap: wrap; }
      .add-form .row button { flex-shrink: 0; }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }
    }

    @media (min-width: 768px) {
      .mobile-only { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    /*
     * ============================================
     *  QUEST FLOW — Responsive Two-Panel App
     * ============================================
     *  Desktop ≥768px : two-panel split (40/60)
     *  Mobile <768px   : single column + slide modal
     * ============================================
     */

    const { useState, useEffect, useCallback, useRef, useMemo } = React;

    // =============================================================
    //  HELPERS
    // =============================================================

    const LS_KEYS = { tasks: 'qf_tasks', theme: 'qf_theme', reminders: 'qf_reminders' };

    function loadJSON(key, fallback) {
      try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
      catch { return fallback; }
    }
    function saveJSON(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
    function todayStr() { return new Date().toISOString().slice(0, 10); }
    function nowTimeStr() {
      var d = new Date(), pad = function (n) { return String(n).padStart(2, '0'); };
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function nowISO() {
      var d = new Date(), pad = function (n) { return String(n).padStart(2, '0'); };
      return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }
    function formatTime12h(timeStr) {
      if (!timeStr) return '';
      var parts = timeStr.split(':');
      var h = parseInt(parts[0], 10), m = parts[1];
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return h + ':' + m + ' ' + ampm;
    }
    function formatDate(dateStr, timeStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr + 'T' + (timeStr || '00:00'));
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + (timeStr ? ' ' + formatTime12h(timeStr) : '');
    }
    function parseDue(dateStr, timeStr) {
      if (!dateStr) return null;
      return new Date(dateStr + 'T' + (timeStr || '23:59'));
    }
    function isTaskOverdue(task) {
      if (task.status === 'completed') return false;
      var due = parseDue(task.dueDate, task.dueTime);
      return due ? due < new Date() : false;
    }
    function isTaskOnTime(task) {
      if (task.status !== 'completed' || !task.completedAt) return false;
      var due = parseDue(task.dueDate, task.dueTime);
      if (!due) return true;
      return new Date(task.completedAt) <= due;
    }
    function makeHistoryEntry(action) { return { action: action, timestamp: nowISO() }; }
    async function requestNotif() {
      if (!('Notification' in window)) return false;

      return React.createElement('div', { className: 'app-container' },
